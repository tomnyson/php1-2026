<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Language" content="vi">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thanh toán - NovaMart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar bg-white border-bottom"><div class="container"><a class="navbar-brand fw-bold" href="index.html">NovaMart</a></div></nav>
  <main class="py-5">
    <div class="container">
      <h1 class="h3 fw-bold mb-4">Thanh toán</h1>
      <div class="row g-4">
        <div class="col-lg-7">
          <form class="table-panel p-4 needs-validation" id="checkoutForm" novalidate>
            <h2 class="h5">Thông tin giao hàng</h2>
            <div class="row g-3 mt-1">
              <div class="col-md-6"><label class="form-label">Họ tên</label><input class="form-control" required></div>
              <div class="col-md-6"><label class="form-label">Điện thoại</label><input class="form-control" pattern="^[0-9]{9,11}$" required></div>
              <div class="col-12"><label class="form-label">Địa chỉ</label><input class="form-control" required></div>
              <div class="col-md-6"><label class="form-label">Tỉnh/Thành</label><input class="form-control" required></div>
              <div class="col-md-6"><label class="form-label">Quận/Huyện</label><input class="form-control" required></div>
            </div>
            <h2 class="h5 mt-4">Thanh toán</h2>
            <div class="form-check"><input class="form-check-input" type="radio" name="payment" checked><label class="form-check-label">COD</label></div>
            <div class="form-check"><input class="form-check-input" type="radio" name="payment"><label class="form-check-label">Chuyển khoản</label></div>
            <button class="btn btn-brand mt-4">Đặt hàng</button>
          </form>
        </div>
        <aside class="col-lg-5"><div class="table-panel p-4"><h2 class="h5">Tóm tắt</h2><div id="checkoutSummary"></div><hr><div class="d-flex justify-content-between fs-5"><span>Tổng</span><strong data-cart-total>0d</strong></div></div></aside>
      </div>
    </div>
  </main>
  <div class="toast-container position-fixed bottom-0 end-0 p-3"><div id="shopToast" class="toast"><div class="toast-body"></div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
