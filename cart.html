<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Language" content="vi">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Giỏ hàng - NovaMart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar bg-white border-bottom"><div class="container"><a class="navbar-brand fw-bold" href="index.html">NovaMart</a><a href="products.html" class="btn btn-outline-secondary">Tiếp tục mua</a></div></nav>
  <main class="py-5">
    <div class="container">
      <h1 class="h3 fw-bold mb-4">Giỏ hàng</h1>
      <div class="row g-4">
        <div class="col-lg-8">
          <div class="table-panel table-responsive">
            <table class="table align-middle mb-0">
              <thead><tr><th>Sản phẩm</th><th>Giá</th><th>Số lượng</th><th>Tạm tính</th><th></th></tr></thead>
              <tbody id="cartItems"></tbody>
            </table>
          </div>
        </div>
        <aside class="col-lg-4">
          <div class="table-panel p-4">
            <h2 class="h5">Tổng đơn</h2>
            <form id="couponForm" class="input-group input-group-sm mb-3">
              <input class="form-control" placeholder="Mã giảm giá NOVA10">
              <button class="btn btn-outline-secondary">Áp dụng</button>
            </form>
            <div class="d-flex justify-content-between"><span>Tạm tính</span><strong data-cart-subtotal>0d</strong></div>
            <div class="d-flex justify-content-between mt-2"><span>Vận chuyển</span><strong data-cart-shipping>0d</strong></div>
            <div class="d-flex justify-content-between mt-2"><span>Giảm giá</span><strong data-cart-discount>-0d</strong></div>
            <hr><div class="d-flex justify-content-between fs-5"><span>Tổng</span><strong data-cart-total>0d</strong></div>
            <a href="checkout.html" class="btn btn-brand w-100 mt-3">Thanh toán</a>
          </div>
        </aside>
      </div>
    </div>
  </main>
  <div class="toast-container position-fixed bottom-0 end-0 p-3"><div id="shopToast" class="toast"><div class="toast-body"></div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
